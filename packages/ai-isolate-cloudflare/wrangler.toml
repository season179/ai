#:schema node_modules/wrangler/config-schema.json

# Cloudflare Worker configuration for Code Mode execution
# Run locally: wrangler dev  (Dynamic Workers binding works in local workerd
#                             on the Free plan; deploy/--remote require Paid)
# Deploy:      wrangler deploy

name = "tanstack-ai-code-mode"
main = "src/worker/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# worker_loader (Dynamic Workers) binding — loads LLM-generated code into a
# fresh V8 isolate via env.LOADER.load(...). Replaces the previous
# `unsafe_eval` binding, which Cloudflare gates for all customer prod
# deploys. Workers Paid plan required to deploy or run --remote; local
# wrangler dev works on the Free plan. Because this Worker evaluates
# arbitrary JavaScript, protect the public endpoint with authentication and
# rate limiting before deploying.
[[worker_loaders]]
binding = "LOADER"

# Local development settings
[dev]
port = 8787
local_protocol = "http"

# Production settings (uncomment and configure for deployment)
# [vars]
# ALLOWED_ORIGINS = "https://your-app.com"

# Optional: Add authentication via Cloudflare Access
# [env.production]
# name = "tanstack-ai-code-mode-prod"
